name: CI

# push と PR で、構文チェックとスモークテストを回す。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Syntax check (py_compile)
        run: python -m py_compile bot.py config.py chat.py seed_corpus.py brain/*.py

      - name: Smoke test (pytest)
        run: pytest -q
